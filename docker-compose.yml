services:
  backend:
    build: ./server
    container_name: cybergap-backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./front
    container_name: cybergap-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
