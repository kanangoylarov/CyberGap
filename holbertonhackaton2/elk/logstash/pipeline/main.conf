input {
  beats {
    port => 5044
  }
}

filter {
  json {
    source => "message"
    skip_on_invalid_json => true
  }

  if [kubernetes][container][name] =~ "gateway" {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "gateway-logs" }
      add_field => { "service" => "gateway" }
    }
    if [source_ip] and [source_ip] != "" {
      geoip {
        source => "source_ip"
        target => "geoip"
      }
    }
  } else if [kubernetes][container][name] =~ "honeypot" {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "honeypot-logs" }
      add_field => { "service" => "honeypot" }
      add_field => { "honeypot_type" => "%{[kubernetes][container][name]}" }
    }
  } else if [kubernetes][container][name] =~ "store" {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "store-logs" }
      add_field => { "service" => "store" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "other-logs" }
      add_field => { "service" => "other" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
  }
}
