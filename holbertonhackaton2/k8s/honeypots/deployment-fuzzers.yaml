apiVersion: apps/v1
kind: Deployment
metadata:
  name: honeypot-fuzzers
  namespace: honeypot
  labels:
    app: honeypot-fuzzers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: honeypot-fuzzers
  template:
    metadata:
      labels:
        app: honeypot-fuzzers
    spec:
      containers:
        - name: honeypot
          image: honeypot:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: HONEYPOT_TYPE
              value: fuzzers
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
